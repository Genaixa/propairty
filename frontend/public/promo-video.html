// ─── MOUSE PARALLAX ───────────────────────────────────────────────────────
// Uses a module-level ref instead of React state — no extra re-renders from mouse moves.
// Since components already re-render at 60fps from the animation RAF, they sample
// this at 60fps naturally. The 0.5s CSS transition smooths out any sub-frame gaps.
const _mousePos = { x: 0, y: 0 };
if (!window.__propMouseSetup) {
  window.__propMouseSetup = true;
  window.addEventListener('mousemove', (e) => {
    _mousePos.x = (e.clientX / window.innerWidth - 0.5) * 2;
    _mousePos.y = (e.clientY / window.innerHeight - 0.5) * 2;
  }, { passive: true });
}
function useMouseParallax() { return _mousePos; }
function px(mouse, depth) {
  return {
    transform: `translate(${mouse.x * depth * 18}px, ${mouse.y * depth * 12}px)`,
    transition: 'transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94)',
  };
}

// ─── PARTICLE FIELD ────────────────────────────────────────────────────────
// Canvas-based: runs its own RAF entirely outside React's reconciliation cycle.
// 55 React-managed divs each reconciled at 60fps → 0 React overhead.
function ParticleField({ count = 45 }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = 1920, H = 1080;
    canvas.width = W; canvas.height = H;
    const pts = Array.from({ length: count }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.5 + 0.4,
      vx: (Math.random() - 0.5) * 0.35,
      vy: -(Math.random() * 0.35 + 0.08),
      op: Math.random() * 0.3 + 0.05,
      dop: (Math.random() > 0.5 ? 1 : -1) * 0.003,
    }));
    let raf;
    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      for (const p of pts) {
        p.x += p.vx; p.y += p.vy;
        p.op += p.dop;
        if (p.op > 0.4 || p.op < 0.03) p.dop *= -1;
        if (p.y < -2) { p.y = H + 2; p.x = Math.random() * W; }
        if (p.x < -2) p.x = W + 2;
        if (p.x > W + 2) p.x = -2;
        ctx.globalAlpha = p.op;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = '#00C6FF';
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(raf);
  }, []);
  return (
    <canvas ref={canvasRef} style={{
      position: 'absolute', inset: 0,
      width: '100%', height: '100%',
      pointerEvents: 'none', zIndex: 0,
    }} />
  );
}

// ─── SCENE 1: CHAOS (2–12s) ──────────────────────────────────────────────
const TOOLS = [

  { n: 'DocuSign',     c: '#FFBD00', sub: 'Signing' },
  { n: 'Fixflo',       c: '#FF6B35', sub: 'Maintenance' },
  { n: 'Slack',        c: '#E01E5A', sub: 'Comms' },
  { n: 'Rightmove',    c: '#00DEB6', sub: 'Listings' },
  { n: 'Outlook',      c: '#0078D4', sub: 'Email' },
  { n: 'Google Drive', c: '#EA4335', sub: 'Docs' },
  { n: 'Zoopla',       c: '#8519E7', sub: 'Search' },
  { n: 'Trello',       c: '#0052CC', sub: 'Tasks' },
  { n: 'Dropbox',      c: '#0061FF', sub: 'Storage' },

  { x: 120, y: 310, r: 7  }, { x: 380, y: 360, r: -8 }, { x: 650, y: 290, r: 4  },

];

function ChaosScene({ time }) {

        ...px(mouse, 0.55),

        <p style={{
          fontSize: 26, color: BR.muted, fontWeight: 400,

// ─── ELEVENLABS FETCH ────────────────────────────────────────────────────
async function fetchELAudio(text) {
  const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${EL_VOICE}`, {
    method: 'POST',
    headers: { 'xi-api-key': EL_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text, model_id: EL_MODEL,
      voice_settings: { stability: 0.42, similarity_boost: 0.82, style: 0.38, use_speaker_boost: true },
    }),
  });
  if (!res.ok) throw new Error(`EL ${res.status}`);
  const blob = await res.blob();
  const audio = new Audio(URL.createObjectURL(blob));
  audio.preload = 'auto';
  return audio;
}

// ─── VO ENGINE — window-level singleton ──────────────────────────────────
if (!window.__propVO) {
  window.__propVO = {
    audios: {}, loaded: {}, loadingStarted: false,
    currentLine: -1, rafId: null, running: false,
    prevAnimTime: null, lastMovedAt: 0,
    getTime: () => 0, getMuted: () => false,

    tick() {
      if (!this.running) return;
      const time  = this.getTime();
      const muted = this.getMuted();
      const now   = performance.now();

      // Detect motion via wall-clock: if animation time changed, note when
      if (time !== this.prevAnimTime) {
        if (this.prevAnimTime !== null && Math.abs(time - this.prevAnimTime) > 2) {
          // Scrub — stop all, reset line
          Object.values(this.audios).forEach(a => { try { a.pause(); a.currentTime = 0; } catch(_){} });
          this.currentLine = -1;
        }
        this.prevAnimTime = time;
        this.lastMovedAt  = now;
      }

      const isPlaying = (now - this.lastMovedAt) < 250; // moving within last 250ms

      if (!isPlaying || muted) {
        Object.values(this.audios).forEach(a => { try { a.pause(); } catch(_){} });
        this.rafId = requestAnimationFrame(() => this.tick());
        return;
      }

      // Which line should play?
      let target = -1;
      for (let i = VO_LINES.length - 1; i >= 0; i--) {
        if (time >= VO_LINES[i].s) { target = i; break; }
      }

      if (target !== this.currentLine) {
        const prev = this.audios[this.currentLine];
        if (prev) { try { prev.pause(); prev.currentTime = 0; } catch(_){} }
        this.currentLine = target;
        const next = this.audios[target];
        // Only play if loaded AND actually paused (guard against double-play)
        if (next && this.loaded[target] && next.paused) {
          next.volume = 1;
          next.play().catch(() => {});
        }
      }

      this.rafId = requestAnimationFrame(() => this.tick());
    },

    start(getTime, getMuted) {
      this.getTime  = getTime;
      this.getMuted = getMuted;
      if (this.running) return; // singleton guard
      this.running = true;
      this.lastMovedAt = 0;
      this.prevAnimTime = null;
      this.rafId = requestAnimationFrame(() => this.tick());
    },

    stop() {
      this.running = false;
      if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; }
      Object.values(this.audios).forEach(a => { try { a.pause(); } catch(_){} });
    },
  };
}

// ─── CONTROLLER COMPONENT ────────────────────────────────────────────────
function VoiceoverController({ muted, onLoadState }) {
  const time     = useTime();
  const timeRef  = React.useRef(time);
  const mutedRef = React.useRef(muted);
  timeRef.current  = time;
  mutedRef.current = muted;

  const [loadedCount, setLoadedCount] = React.useState(Object.keys(voEngine.loaded).length);
  const [loadState,   setLoadState]   = React.useState(loadedCount >= VO_LINES.length ? 'ready' : 'loading');

  // Load VO — guarded so only runs once even with Strict Mode double-mount
  React.useEffect(() => {
    if (voEngine.loadingStarted) return;
    voEngine.loadingStarted = true;
    let alive = true;
    (async () => {
      const BATCH = 3;
      for (let b = 0; b < VO_LINES.length; b += BATCH) {
        if (!alive) break;
        const batch = Array.from({ length: Math.min(BATCH, VO_LINES.length - b) }, (_, k) => b + k);
        await Promise.all(batch.map(async (i) => {
          if (voEngine.loaded[i]) return;
          try {
            voEngine.audios[i] = await fetchELAudio(VO_LINES[i].t);
            voEngine.loaded[i] = true;
          } catch(e) { console.warn('VO', i, e.message); voEngine.loaded[i] = false; }
          if (alive) setLoadedCount(prev => prev + 1);
        }));
      }
      if (alive) setLoadState('ready');
    })();
    return () => { alive = false; };
  }, []);

  React.useEffect(() => { onLoadState && onLoadState(loadState, loadedCount); }, [loadState, loadedCount]);

  // Start VO engine
  React.useEffect(() => {
    voEngine.start(() => timeRef.current, () => mutedRef.current);
    return () => voEngine.stop();
  }, []);

  // Music play/pause
  const prevRef = React.useRef(time);
  React.useEffect(() => {
    const delta  = time - prevRef.current;
    const moving = delta > 0.001 && delta < 0.5;
    prevRef.current = time;
    if (muted) { musicEngine.pause(); return; }
    if (moving) musicEngine.play();
    else musicEngine.pause();
  }, [Math.floor(time * 4) / 4, muted]);

  return null;
}

  "bgColor": "#020B18",
  "subtitleSize": 24,
  "showParticles": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);
  const [muted, setMuted] = React.useState(false);
  const [voiceLoad, setVoiceLoad] = React.useState('loading');
  const [loadedCount, setLoadedCount] = React.useState(0);

  React.useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const updateTweak = (key, val) => {
    const v = { ...tweaks, [key]: val };
    setTweaks(v);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: v }, '*');
  };

  return (
    <>
      <Stage width={1920} height={1080} duration={90} background={tweaks.bgColor}>
        <PropairtyVideo muted={muted} onLoadState={(s, c) => { setVoiceLoad(s); setLoadedCount(c || 0); }} />
      </Stage>

      {/* Mute button — always visible, outside Stage scaling */}
      <div
        onClick={() => {
          setMuted(m => !m);
        }}
        title={voiceLoad === 'loading' ? `Loading voiceover… (${loadedCount}/11)` : muted ? 'Unmute voiceover' : 'Mute voiceover'}
        style={{
          position: 'fixed', bottom: 56, right: 16, zIndex: 9998,
          width: voiceLoad === 'loading' ? 52 : 36, height: 36, borderRadius: voiceLoad === 'loading' ? 18 : '50%',
          background: 'rgba(2,11,24,0.88)',
          border: `1px solid ${muted ? 'rgba(255,255,255,0.15)' : voiceLoad === 'loading' ? 'rgba(245,158,11,0.5)' : 'rgba(0,198,255,0.4)'}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          cursor: 'pointer', backdropFilter: 'blur(8px)',
          fontSize: voiceLoad === 'loading' ? 11 : 16, userSelect: 'none',
          boxShadow: '0 2px 12px rgba(0,0,0,0.4)',
          transition: 'border-color 0.3s',
          color: voiceLoad === 'loading' ? '#F59E0B' : '#fff',
          fontFamily: BR.font, fontWeight: 700,
          animation: voiceLoad === 'loading' ? 'pulse 1.2s ease-in-out infinite' : 'none',
        }}>
        {voiceLoad === 'loading' ? `${loadedCount}/11` : muted ? '🔇' : '🔊'}
      </div>

      {showTweaks && (
        <div style={{
          position: 'fixed', bottom: 100, right: 20, zIndex: 9999,
          background: 'rgba(2,11,24,0.96)', border: '1px solid rgba(0,198,255,0.25)',
          borderRadius: 14, padding: '20px 22px', width: 270,
          backdropFilter: 'blur(16px)',
          boxShadow: '0 8px 32px rgba(0,0,0,0.5)',
          fontFamily: BR.font,
        }}>
          <div style={{ color: '#fff', fontWeight: 700, fontSize: 14, marginBottom: 18, letterSpacing: '-0.01em' }}>Tweaks</div>

          {[
            { label: 'Accent Color', key: 'accentColor', type: 'color' },
            { label: 'Background Color', key: 'bgColor',    type: 'color' },
          ].map(({ label, key, type }) => (
            <div key={key} style={{ marginBottom: 14 }}>
              <div style={{ color: BR.muted, fontSize: 11, fontWeight: 600, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{label}</div>
              <input type={type} value={tweaks[key]}
                style={{ width: '100%', height: 36, borderRadius: 8, border: 'none', cursor: 'pointer', background: 'none' }}
                onChange={e => updateTweak(key, e.target.value)} />
            </div>
          ))}

          <div style={{ marginBottom: 14 }}>
            <div style={{ color: BR.muted, fontSize: 11, fontWeight: 600, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.08em' }}>
              Subtitle Size: {tweaks.subtitleSize}px
            </div>
            <input type="range" min={16} max={30} step={1} value={tweaks.subtitleSize}
              style={{ width: '100%', accentColor: BR.accent }}
              onChange={e => updateTweak('subtitleSize', +e.target.value)} />
          </div>

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ color: BR.muted, fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Particles</div>
            <div onClick={() => updateTweak('showParticles', !tweaks.showParticles)}
              style={{
                width: 40, height: 22, borderRadius: 100, cursor: 'pointer',
                background: tweaks.showParticles ? BR.accent : BR.dimmed,
                position: 'relative', transition: 'background 0.2s',
              }}>
              <div style={{
                position: 'absolute', top: 3, left: tweaks.showParticles ? 20 : 3,
                width: 16, height: 16, borderRadius: '50%', background: '#fff',
                transition: 'left 0.2s',
              }} />
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
