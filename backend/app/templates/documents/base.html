<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page {
    margin: 2.5cm 2cm;
    @bottom-right { content: "Page " counter(page) " of " counter(pages); font-size: 9pt; color: #666; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, 'Times New Roman', serif; font-size: 11pt; line-height: 1.6; color: #1a1a1a; }
  .header { border-bottom: 2px solid #1a1a1a; padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
  .brand { font-size: 18pt; font-weight: bold; letter-spacing: -0.5px; }
  .brand span { color: #4338ca; }
  .doc-meta { text-align: right; font-size: 9pt; color: #555; }
  h1 { font-size: 16pt; text-align: center; margin-bottom: 6px; }
  h2 { font-size: 12pt; margin: 20px 0 8px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
  h3 { font-size: 11pt; margin: 14px 0 6px; }
  p { margin-bottom: 8px; }
  .parties { background: #f8f8f8; border: 1px solid #ddd; padding: 14px 18px; margin: 16px 0; border-radius: 4px; }
  .parties table { width: 100%; border-collapse: collapse; }
  .parties td { padding: 4px 8px; vertical-align: top; }
  .parties td:first-child { font-weight: bold; width: 35%; color: #444; }
  .notice-box { border: 2px solid #1a1a1a; padding: 16px 20px; margin: 20px 0; }
  .notice-box.warning { border-color: #c0392b; background: #fdf2f2; }
  .notice-box.info { border-color: #4338ca; background: #f0f0ff; }
  .clause { margin-bottom: 12px; padding-left: 16px; }
  .clause-num { font-weight: bold; }
  .signature-block { margin-top: 40px; display: flex; gap: 60px; }
  .signature-line { flex: 1; }
  .signature-line hr { border: none; border-top: 1px solid #333; margin: 30px 0 4px; }
  .signature-line p { font-size: 9pt; color: #555; }
  .footer { margin-top: 30px; padding-top: 12px; border-top: 1px solid #ccc; font-size: 8.5pt; color: #777; text-align: center; }
  .highlight { background: #fffde7; padding: 2px 4px; }
  ul { margin: 8px 0 8px 24px; page-break-inside: avoid; }
  li { margin-bottom: 4px; page-break-inside: avoid; }
  .amount { font-weight: bold; font-size: 12pt; }
  .ref { font-size: 9pt; color: #666; }
</style>
</head>
<body>
<div class="header">
  <div class="brand">Prop<span>AI</span>rty</div>
  <div class="doc-meta">
    <div>{{ org_name }}</div>
    <div>Date: {{ today }}</div>
    {% if ref %}<div>Ref: {{ ref }}</div>{% endif %}
  </div>
</div>
{% block content %}{% endblock %}
{% if signature_block %}{{ signature_block | safe }}{% endif %}
<div class="footer">
  Generated by PropAIrty Property Management Platform &nbsp;·&nbsp; {{ today }} &nbsp;·&nbsp; {{ org_name }}
</div>
</body>
</html>
